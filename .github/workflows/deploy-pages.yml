name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'stock-selection-system.html'
      - 'build_deploy.js'
      - 'build_briefings.js'
      - '选股结果/**'
      - 'VERSION.json'
      - 'CHANGELOG.md'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site (生成 deploy/)
        run: node build_deploy.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          enable_jekyll: false
          force_orphan: true
          commit_message: 'auto-deploy: ${{ github.event.head_commit.message }}'
